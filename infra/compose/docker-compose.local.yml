services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: wortmeister
      MYSQL_USER: wortmeister
      MYSQL_PASSWORD: wortmeister
      MYSQL_ROOT_PASSWORD: wortmeister-root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    environment:
      DB_URL: jdbc:mysql://mysql:3306/wortmeister?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: wortmeister
      DB_PASSWORD: wortmeister
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: local-development-secret-must-be-overridden-with-a-long-value
      AI_SERVICE_URL: http://ai-service:8000
      AI_INTERNAL_API_KEY: local-internal-secret
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  ai-service:
    build:
      context: ../../services/ai-service
    environment:
      ENVIRONMENT: local
      INTERNAL_API_KEY: local-internal-secret
      REDIS_URL: redis://redis:6379/1
      AI_PROVIDER: local
    ports:
      - "8000:8000"
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ai-service

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ai-service

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.1
    ports:
      - "5044:5044"
    volumes:
      - ../monitoring/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.1
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch

volumes:
  mysql_data:
  redis_data:
  grafana_data:
  elastic_data:
