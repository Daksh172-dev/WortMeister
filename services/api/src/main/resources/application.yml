spring:
  application:
    name: wortmeister-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/wortmeister?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:wortmeister}
    password: ${DB_PASSWORD:wortmeister}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${PORT:8080}
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt-secret: ${JWT_SECRET:local-development-secret-must-be-overridden}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:30}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    internal-api-key: ${AI_INTERNAL_API_KEY:local-ai-internal-key}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
