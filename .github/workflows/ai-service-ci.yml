name: AI Service CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - run: ruff check app tests
      - run: pytest
